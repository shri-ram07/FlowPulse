services:
  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    container_name: flowpulse-backend
    environment:
      FLOWPULSE_JWT_SECRET: ${FLOWPULSE_JWT_SECRET:-dev-secret-change-me}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    container_name: flowpulse-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"
