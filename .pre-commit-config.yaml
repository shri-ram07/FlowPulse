# Pre-commit hooks for FlowPulse.
#
# Install once:   pip install pre-commit && pre-commit install
# Run manually:   pre-commit run --all-files
#
# Blocks commits that:
#   - leak secrets (gitleaks)
#   - fail ruff lint or formatting
#   - break mypy on the strict-typed modules
#   - introduce merge markers / BOM / trailing whitespace
#   - contain un-prettier'd frontend code
#
# Does NOT block on: mypy across the whole backend (pragmatic), eslint (Next
# handles this in the build), or coverage (CI enforces that).

default_language_version:
  python: python3

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix"]
        types: [python]
      - id: ruff-format
        types: [python]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        name: mypy (strict on core / security / observability)
        files: ^backend/(core|security|observability)/
        args: ["--strict", "--ignore-missing-imports"]
        additional_dependencies:
          - "pydantic>=2.9"
          - "fastapi"
          - "types-requests"

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (secret scan)

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: \.(ts|tsx|js|jsx|json|css|md|yml|yaml)$
        exclude: ^(frontend/\.next/|frontend/node_modules/|\.venv/)
