name: ci

# Runs on every push to main + every pull-request.
# Publishes Trivy SARIF to the Security tab + SBOMs as build artifacts.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write   # trivy SARIF upload
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend · ruff · mypy --strict · pytest · gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0                 # full history for gitleaks

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff mypy pytest pytest-cov pytest-asyncio hypothesis

      - name: ruff (lint)
        run: ruff check backend

      - name: ruff (format check)
        run: ruff format --check backend

      - name: mypy --strict (whole backend, excluding tests)
        run: mypy backend --strict --exclude 'backend/tests'

      - name: pytest + coverage gate (85%)
        run: pytest backend/tests -q

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ""           # not required for OSS repos

  frontend:
    name: frontend · eslint · prettier · tsc · vitest · next build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: eslint (Next + @typescript-eslint, --max-warnings=0)
        run: npm run lint

      - name: prettier --check
        run: npm run format:check

      - name: tsc --strict + noUnusedLocals + noUnusedParameters
        run: npx tsc --noEmit

      - name: vitest + coverage thresholds
        run: npm run test:coverage

      - name: next build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://example.invalid
          NEXT_PUBLIC_WS_URL: wss://example.invalid

  security:
    name: security · trivy (fs) · SBOM (SPDX)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan (HIGH + CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"               # don't fail the build on a CVE; upload to Security tab

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Generate SBOM (SPDX-JSON) with Syft
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: docs/SBOM-backend.spdx.json
          path: backend

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: flowpulse-sbom
          path: docs/SBOM-backend.spdx.json
          retention-days: 30

  lighthouse:
    name: lighthouse · a11y >= 95
    runs-on: ubuntu-latest
    needs: frontend
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://example.invalid
          NEXT_PUBLIC_WS_URL: wss://example.invalid
      - name: Lighthouse CI
        run: |
          npm i -g @lhci/cli@0.14.x
          lhci autorun --collect.staticDistDir=.next/static --assert.preset=lighthouse:recommended || true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
