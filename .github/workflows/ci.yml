name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write   # allow Trivy to upload SARIF

jobs:
  # ---------------------------------------------------------------------------
  # Backend: lint + type-check + tests with coverage gate.
  # ---------------------------------------------------------------------------
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install deps
        run: |
          pip install -r backend/requirements.txt
          pip install ruff mypy
      - name: Lint (ruff)
        run: ruff check backend
      - name: Type check (mypy strict on pure modules)
        run: mypy backend/core backend/security backend/observability --strict --ignore-missing-imports
      - name: Tests with coverage gate
        run: pytest backend/tests -q
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  # ---------------------------------------------------------------------------
  # Frontend: tsc + vitest + next build.
  # ---------------------------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - working-directory: frontend
        run: |
          npm install
          npx tsc --noEmit
          npm test
          npm run build

  # ---------------------------------------------------------------------------
  # Security: gitleaks secret scan + Trivy container scan + SBOM generation.
  # ---------------------------------------------------------------------------
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy-backend:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v6
      - name: Build backend image
        run: docker build -f infra/Dockerfile.backend -t flowpulse-backend:ci .
      - name: Trivy scan (backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: flowpulse-backend:ci
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          ignore-unfixed: true
          format: "sarif"
          output: trivy-backend.sarif
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

  trivy-frontend:
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v6
      - name: Build frontend image
        run: docker build -f infra/Dockerfile.frontend -t flowpulse-frontend:ci .
      - name: Trivy scan (frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: flowpulse-frontend:ci
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          ignore-unfixed: true

  sbom:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v6
      - name: Build backend image
        run: docker build -f infra/Dockerfile.backend -t flowpulse-backend:sbom .
      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          image: flowpulse-backend:sbom
          format: spdx-json
          output-file: docs/SBOM-backend.spdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: docs/SBOM-backend.spdx.json

  # ---------------------------------------------------------------------------
  # Lighthouse CI against the deployed frontend (runs on main only).
  # ---------------------------------------------------------------------------
  lighthouse:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://flowpulse-frontend-g6g2de3yuq-el.a.run.app/
            https://flowpulse-frontend-g6g2de3yuq-el.a.run.app/map
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./.lighthouserc.json

  # ---------------------------------------------------------------------------
  # Commit-message lint on PRs (conventional commits).
  # ---------------------------------------------------------------------------
  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - uses: wagoid/commitlint-github-action@v6
